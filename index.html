<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>&#20320;&#33021;&#20570;&#21040;</title>
    <link rel="stylesheet" href="styles.css?v=20260514-12" />
  </head>
  <body>
    <main class="device-shell">
      <section class="device-panel" aria-label="study counter device">
        <header class="device-header">
          <div>
            <div class="title-row">
              <h1>&#20320;&#33021;&#20570;&#21040;</h1>
              <section class="level-mini">
                <span class="level-mini-label">&#31561;&#32026;&#33287;&#32147;&#39511;&#20540;</span>
                <div class="level-mini-main"><small>Lv</small><span id="levelValue">1</span></div>
                <div class="xp-panel">
                  <span>EXP <b id="xpValue">0</b>/<b id="xpNeedValue">100</b></span>
                  <div class="xp-bar" aria-hidden="true"><i id="xpBar"></i></div>
                </div>
                <button id="levelResetBtn" type="button">&#31561;&#32026;&#27512;&#38646;</button>
              </section>
            </div>
            <p class="tagline">Boring&rsquo; = simple things that bring value and enjoyment to life.</p>
          </div>
          <div class="current-time" aria-live="polite">
            <span>&#29694;&#22312;&#26178;&#38291;</span>
            <b id="currentTime">--:--:--</b>
          </div>
          <label class="language-control">
            <span>&#35486;&#35328;</span>
            <select id="languageSelect">
              <option value="zh">&#20013;&#25991;</option>
              <option value="en">English</option>
              <option value="de">Deutsch</option>
              <option value="ja">&#26085;&#26412;&#35486;</option>
            </select>
          </label>
        </header>

        <section class="goal-panel" aria-label="today goals">
          <div class="goal-head">
            <div class="goal-title">
              <span>&#20170;&#26085;&#30446;&#27161;</span>
              <small>&#27599;&#26085;00:00&#37325;&#32622;</small>
            </div>
            <button id="goalResetBtn" type="button">&#28165;&#31354;</button>
          </div>
          <div class="todo-grid">
            <label class="todo-item">
              <input class="todo-check" type="checkbox" data-todo-check="0" />
              <input class="todo-text" type="text" data-todo-text="0" placeholder="&#36664;&#20837;&#20170;&#26085;&#35201;&#23436;&#25104;&#30340;&#20107;" />
            </label>
            <label class="todo-item">
              <input class="todo-check" type="checkbox" data-todo-check="1" />
              <input class="todo-text" type="text" data-todo-text="1" placeholder="&#36664;&#20837;&#20170;&#26085;&#35201;&#23436;&#25104;&#30340;&#20107;" />
            </label>
            <label class="todo-item">
              <input class="todo-check" type="checkbox" data-todo-check="2" />
              <input class="todo-text" type="text" data-todo-text="2" placeholder="&#36664;&#20837;&#20170;&#26085;&#35201;&#23436;&#25104;&#30340;&#20107;" />
            </label>
            <label class="todo-item">
              <input class="todo-check" type="checkbox" data-todo-check="3" />
              <input class="todo-text" type="text" data-todo-text="3" placeholder="&#36664;&#20837;&#20170;&#26085;&#35201;&#23436;&#25104;&#30340;&#20107;" />
            </label>
          </div>
        </section>

        <section class="counter-grid" aria-label="study counters">
          <article class="counter-card time-card">
            <span class="counter-label">&#20498;&#25976;&#26178;&#38291;</span>
            <label class="countdown-setting">
              <span>&#35373;&#23450;&#20998;&#37912;</span>
              <div>
                <input id="countdownMinutesInput" type="number" min="1" step="1" inputmode="numeric" />
                <button id="countdownSetBtn" type="button">&#35373;&#32622;</button>
              </div>
            </label>
            <strong><span id="studyTime">25:00</span></strong>
            <p class="focus-total">
              <span>&#24050;&#32047;&#31309;&#23560;&#27880;&#26178;&#38291;</span>
              <b><span id="focusTotalMinutes">0</span> <span id="focusTotalUnit">&#20998;&#37912;</span></b>
            </p>
            <div class="running-cat-image" aria-hidden="true">
              <span class="cat-photo-base"></span>
              <span class="cat-photo-part cat-photo-tail"></span>
              <span class="cat-photo-part cat-photo-back-leg"></span>
              <span class="cat-photo-part cat-photo-front-leg"></span>
            </div>
            <label class="focus-toggle">
              <input id="focusModeInput" type="checkbox" />
              <span>&#23560;&#27880;&#27169;&#24335;</span>
            </label>
            <button id="focusExitBtn" class="focus-exit" type="button">&#36864;&#20986;</button>
            <div class="counter-actions">
              <button id="timerToggleBtn" type="button">&#38283;&#22987;</button>
              <button id="timerResetBtn" type="button">&#27512;&#38646;</button>
            </div>
          </article>

          <article class="counter-card future-card">
            <span class="counter-label">&#26410;&#20358;&#27963;&#21205;</span>
            <div class="future-tools">
              <label class="future-search-field">
                <span>&#25628;&#23563;&#26085;&#26399;</span>
                <input id="futureSearchDateInput" type="date" />
              </label>
              <button id="futureClearSearchBtn" type="button">&#20840;&#37096;</button>
            </div>
            <div class="future-add">
              <label>
                <span>&#27963;&#21205;&#26085;&#26399;</span>
                <input id="futureDateInput" type="date" />
              </label>
              <label>
                <span>&#27963;&#21205;&#20839;&#23481;</span>
                <input id="futureTextInput" type="text" placeholder="&#36664;&#20837;&#26410;&#20358;&#27963;&#21205;" />
              </label>
              <button id="futureAddBtn" type="button">&#21152;&#20837;</button>
            </div>
            <ol id="futureList" class="future-list"></ol>
          </article>

          <article class="counter-card news-card">
            <div class="news-head">
              <span class="counter-label">&#20170;&#26085;&#37325;&#40670;&#26032;&#32862;</span>
              <div class="news-actions">
                <button id="newsRefreshBtn" type="button">&#26356;&#26032;</button>
                <a id="newsMoreLink" href="https://news.google.com/topstories?hl=zh-TW&gl=TW&ceid=TW:zh-Hant" target="_blank" rel="noreferrer">&#26356;&#22810;</a>
              </div>
            </div>
            <div class="news-sources" aria-label="news sources">
              <button type="button" data-news-source="tw">TW</button>
              <button type="button" data-news-source="bbc">BBC</button>
              <button type="button" data-news-source="dw">DW</button>
            </div>
            <ol id="newsList" class="news-list">
              <li>&#36617;&#20837;&#26032;&#32862;&#20013;</li>
            </ol>
            <p id="newsStatus" class="news-status"></p>
          </article>
        </section>

        <span id="saveStatus" class="save-status" aria-live="polite"></span>
      </section>
    </main>

    <aside class="theme-control" aria-label="theme color controls">
      <button id="themeToggleBtn" class="theme-toggle" type="button" aria-label="&#25910;&#21512;&#33394;&#24425;&#35373;&#23450;">&#33394;</button>
      <label>
        <span>&#32972;&#26223;</span>
        <select id="bgColorInput"></select>
      </label>
      <label>
        <span>&#23383;&#39636;</span>
        <select id="textColorInput"></select>
      </label>
      <label>
        <span>&#26694;&#32218;</span>
        <select id="lineColorInput"></select>
      </label>
      <label>
        <span>&#31895;&#32048;</span>
        <select id="lineWidthInput">
          <option value="1px">1px</option>
          <option value="2px">2px</option>
          <option value="3px">3px</option>
          <option value="4px">4px</option>
        </select>
      </label>
      <label>
        <span>&#26684;&#23376;</span>
        <select id="paperColorInput"></select>
      </label>
      <label>
        <span>&#20027;&#24213;</span>
        <select id="timerColorInput"></select>
      </label>
      <div class="theme-memory" aria-label="theme memory slots">
        <span>&#38928;&#35373;&#37197;&#33394;</span>
        <div>
          <button type="button" data-theme-preset="0">&#26085;&#31995;</button>
          <button type="button" data-theme-preset="1">&#27387;&#33457;&#21487;&#24859;&#39080;</button>
          <button type="button" data-theme-preset="2">&#33258;&#28982;&#39080;</button>
          <button type="button" data-theme-preset="3">&#22799;&#26085;&#28165;&#38684;</button>
        </div>
        <span>&#33258;&#35330;&#35352;&#25014;</span>
        <div class="theme-slot">
          <input type="text" data-theme-name="0" placeholder="&#33258;&#35330; 1" />
          <button type="button" data-theme-save="0">&#20445;&#23384;</button>
          <button type="button" data-theme-load="0">&#20351;&#29992;</button>
          <button type="button" data-theme-delete="0">&#21034;&#38500;</button>
        </div>
        <div class="theme-slot">
          <input type="text" data-theme-name="1" placeholder="&#33258;&#35330; 2" />
          <button type="button" data-theme-save="1">&#20445;&#23384;</button>
          <button type="button" data-theme-load="1">&#20351;&#29992;</button>
          <button type="button" data-theme-delete="1">&#21034;&#38500;</button>
        </div>
        <div class="theme-slot">
          <input type="text" data-theme-name="2" placeholder="&#33258;&#35330; 3" />
          <button type="button" data-theme-save="2">&#20445;&#23384;</button>
          <button type="button" data-theme-load="2">&#20351;&#29992;</button>
          <button type="button" data-theme-delete="2">&#21034;&#38500;</button>
        </div>
      </div>
    </aside>

    <div id="bombOverlay" class="bomb-overlay" hidden role="alert" aria-live="assertive">
      <div class="bomb-card">
        <div class="bomb-icon" aria-hidden="true">&#128163;</div>
        <strong>&#26178;&#38291;&#21040;&#65281;</strong>
        <span>&#20241;&#24687;&#19968;&#19979;&#65292;&#28982;&#24460;&#32380;&#32396;&#21069;&#36914;&#12290;</span>
        <button id="bombCloseBtn" type="button">&#30693;&#36947;&#20102;</button>
      </div>
    </div>

    <script src="nippon-colors.js?v=20260514-12"></script>
    <script src="app.js?v=20260514-12"></script>
  </body>
</html>
