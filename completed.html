<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Completed</title>
    <link rel="stylesheet" href="styles.css?v=20260517-57" />
    <style>
      body {
        min-height: 100vh;
        padding: 18px;
      }

      .history-shell {
        width: min(760px, 100%);
        margin: 0 auto;
        padding: 16px;
        border: var(--line-width) solid var(--line);
        border-radius: 8px;
        background: var(--panel-bg);
        box-shadow: 0 18px 60px color-mix(in srgb, var(--line) 14%, transparent);
      }

      .history-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding-bottom: 12px;
        border-bottom: var(--line-width) solid var(--line);
      }

      .history-head h1 {
        margin: 0;
        font-size: clamp(1.45rem, 4vw, 2.1rem);
        font-weight: 900;
      }

      .history-head a,
      .restore-btn {
        display: inline-grid;
        min-height: 34px;
        place-items: center;
        padding: 0 13px;
        border: var(--line-width) solid var(--line);
        border-radius: 8px;
        background: var(--paper-soft);
        color: var(--ink);
        font: inherit;
        font-weight: 900;
        line-height: 1.15;
        overflow-wrap: anywhere;
        text-decoration: none;
      }

      .history-list {
        display: grid;
        gap: 12px;
        margin-top: 14px;
      }

      .history-day {
        display: grid;
        gap: 8px;
        padding: 12px;
        border: var(--line-width) solid var(--line);
        border-radius: 8px;
        background: var(--paper);
      }

      .history-day h2 {
        margin: 0;
        font-size: 1rem;
        font-weight: 900;
      }

      .history-day ol {
        display: grid;
        gap: 7px;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .history-item {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 8px;
        align-items: center;
        padding: 8px 9px;
        border: var(--line-width) solid color-mix(in srgb, var(--line) 58%, transparent);
        border-radius: 8px;
        background: color-mix(in srgb, var(--panel-bg) 58%, transparent);
      }

      .history-item span {
        min-width: 0;
        line-height: 1.5;
        font-weight: 800;
        overflow-wrap: anywhere;
      }

      .restore-btn {
        min-height: 30px;
        padding: 0 11px;
        cursor: pointer;
      }

      .empty-history {
        margin: 18px 0 0;
        color: var(--ink);
        font-weight: 800;
        text-align: center;
      }

      html[lang="de"] .history-head {
        align-items: flex-start;
      }

      html[lang="de"] .history-head a,
      html[lang="de"] .restore-btn {
        font-size: 0.78rem;
      }

      @media (max-width: 560px) {
        body {
          padding: 10px;
        }

        .history-shell {
          padding: 12px;
        }

        .history-item {
          grid-template-columns: 1fr;
        }

        .restore-btn {
          justify-self: end;
        }
      }
    </style>
  </head>
  <body>
    <main class="history-shell">
      <header class="history-head">
        <h1 id="pageTitle"></h1>
        <a id="backLink" href="index.html"></a>
      </header>
      <section id="historyList" class="history-list" aria-label="completed goals"></section>
      <p id="emptyHistory" class="empty-history" hidden></p>
    </main>
    <script>
      const storageKey = "minimal-study-counter-v1";
      const themeStorageKey = "minimal-study-counter-theme-v1";
      const languageStorageKey = "minimal-study-counter-language-v1";
      const todoCount = 8;
      const translations = {
        zh: {
          htmlLang: "zh-Hant",
          title: "\u5df2\u5b8c\u6210",
          back: "\u8fd4\u56de",
          empty: "\u5c1a\u672a\u6709\u5b8c\u6210\u7d00\u9304",
          restore: "\u56de\u5fa9",
          uncategorized: "\u672a\u5206\u985e",
          fullAlert: "\u4eca\u65e5\u76ee\u6a19\u5df2\u6eff\uff0c\u8acb\u5148\u7a7a\u51fa\u4e00\u683c\u518d\u56de\u5fa9\u3002",
        },
        en: {
          htmlLang: "en",
          title: "Completed",
          back: "Back",
          empty: "No completed records yet",
          restore: "Restore",
          uncategorized: "Uncategorized",
          fullAlert: "Today's goals are full. Please free one slot before restoring.",
        },
        de: {
          htmlLang: "de",
          title: "Fertig",
          back: "Zur\u00fcck",
          empty: "Noch keine erledigten Eintr\u00e4ge",
          restore: "Zur\u00fcck",
          uncategorized: "Ohne Datum",
          fullAlert: "Die Tagesziele sind voll. Bitte erst einen Platz freimachen.",
        },
        ja: {
          htmlLang: "ja",
          title: "\u5b8c\u4e86",
          back: "\u623b\u308b",
          empty: "\u307e\u3060\u5b8c\u4e86\u8a18\u9332\u306f\u3042\u308a\u307e\u305b\u3093",
          restore: "\u623b\u3059",
          uncategorized: "\u672a\u5206\u985e",
          fullAlert: "\u4eca\u65e5\u306e\u76ee\u6a19\u304c\u6e80\u676f\u3067\u3059\u30021\u3064\u7a7a\u3051\u3066\u304b\u3089\u623b\u3057\u3066\u304f\u3060\u3055\u3044\u3002",
        },
      };

      function currentLanguage() {
        const saved = localStorage.getItem(languageStorageKey);
        return translations[saved] ? saved : "zh";
      }

      function dict() {
        return translations[currentLanguage()];
      }

      function localDateKey() {
        const date = new Date();
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, "0");
        const day = String(date.getDate()).padStart(2, "0");
        return `${year}-${month}-${day}`;
      }

      function applyTheme() {
        try {
          const theme = JSON.parse(localStorage.getItem(themeStorageKey) || "{}");
          const root = document.documentElement;
          if (typeof theme.bg === "string") root.style.setProperty("--bg", theme.bg);
          if (typeof theme.text === "string") root.style.setProperty("--ink", theme.text);
          if (typeof theme.line === "string") root.style.setProperty("--line", theme.line);
          if (typeof theme.lineWidth === "string") root.style.setProperty("--line-width", theme.lineWidth);
          if (typeof theme.paper === "string") {
            root.style.setProperty("--paper", theme.paper);
            root.style.setProperty("--paper-soft", theme.paper);
          }
          if (typeof theme.timer === "string") root.style.setProperty("--panel-bg", theme.timer);
        } catch {}
      }

      function applyLanguage() {
        const text = dict();
        document.documentElement.lang = text.htmlLang;
        document.title = text.title;
        document.querySelector("#pageTitle").textContent = text.title;
        document.querySelector("#backLink").textContent = text.back;
        document.querySelector("#emptyHistory").textContent = text.empty;
      }

      function loadState() {
        try {
          return JSON.parse(localStorage.getItem(storageKey) || "{}") || {};
        } catch {
          return {};
        }
      }

      function saveState(state) {
        localStorage.setItem(storageKey, JSON.stringify(state));
      }

      function normalizeTodos(todos) {
        const list = Array.isArray(todos) ? todos : [];
        const active = list
          .map((todo) => ({
            text: String(todo?.text || "").trim(),
            done: Boolean(todo?.done),
          }))
          .filter((todo) => todo.text);
        return Array.from({ length: todoCount }, (_, index) => active[index] || { text: "", done: false });
      }

      function completedGoalsFrom(state) {
        return Array.isArray(state.completedGoals)
          ? state.completedGoals
              .map((goal) => ({
                id: String(goal?.id || `${Date.now()}-${Math.random().toString(16).slice(2)}`),
                text: String(goal?.text || "").trim(),
                date: /^\d{4}-\d{2}-\d{2}$/.test(String(goal?.date || "")) ? String(goal.date) : localDateKey(),
                completedAt: String(goal?.completedAt || new Date().toISOString()),
              }))
              .filter((goal) => goal.text)
          : [];
      }

      function groupByDate(items) {
        return items.reduce((groups, item) => {
          const date = item.date || dict().uncategorized;
          if (!groups[date]) groups[date] = [];
          groups[date].push(item);
          return groups;
        }, {});
      }

      function restoreGoal(goalId) {
        const state = loadState();
        const completedGoals = completedGoalsFrom(state);
        const goal = completedGoals.find((item) => item.id === goalId);
        if (!goal) return;

        const todos = normalizeTodos(state.goals?.todos);
        const activeTodos = todos.filter((todo) => todo.text);
        if (activeTodos.length >= todoCount) {
          window.alert(dict().fullAlert);
          return;
        }

        state.goals = {
          ...(state.goals && typeof state.goals === "object" ? state.goals : {}),
          todos: normalizeTodos([{ text: goal.text, done: false }, ...activeTodos]),
        };
        state.goalsDate = localDateKey();
        state.completedGoals = completedGoals.filter((item) => item.id !== goalId);
        saveState(state);
        render();
      }

      function render() {
        applyLanguage();
        const list = document.querySelector("#historyList");
        const empty = document.querySelector("#emptyHistory");
        const state = loadState();
        const cleanGoals = completedGoalsFrom(state).sort((a, b) =>
          String(b.completedAt || b.date || "").localeCompare(String(a.completedAt || a.date || "")),
        );

        empty.hidden = cleanGoals.length > 0;
        list.innerHTML = "";

        Object.entries(groupByDate(cleanGoals)).forEach(([date, goals]) => {
          const section = document.createElement("article");
          section.className = "history-day";
          const title = document.createElement("h2");
          title.textContent = date;
          const ol = document.createElement("ol");
          goals.forEach((goal) => {
            const li = document.createElement("li");
            li.className = "history-item";
            const text = document.createElement("span");
            text.textContent = goal.text;
            const button = document.createElement("button");
            button.className = "restore-btn";
            button.type = "button";
            button.textContent = dict().restore;
            button.addEventListener("click", () => restoreGoal(goal.id));
            li.append(text, button);
            ol.append(li);
          });
          section.append(title, ol);
          list.append(section);
        });
      }

      applyTheme();
      render();
    </script>
  </body>
</html>
