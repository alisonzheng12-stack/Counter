# update news workflow
name: Update news cache

on:
  schedule:
    - cron: "7 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build news cache
        run: node scripts/update-news.mjs

      - name: Commit news cache
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update news cache"
          file_pattern: news.json
